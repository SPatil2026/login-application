# These settings control Nginx at the operating-system level, defining how it runs and logs core errors.

#user  nobody;
worker_processes  1;  # Defines no of worker processes
# worker_processes auto; # Defines no of worker processes based on no of cpu cores

error_log  logs/error.log;
error_log  logs/error.log  notice;
error_log  logs/error.log  info;
# errors are wrtten to a default path /var/log/nginx/error.log
# error_log /dev/stderr warn; # errors are written to stderr

pid        logs/nginx.pid;
# pid /var/run/nginx.pid;
# The file where Nginx stores its master Process ID (PID)

# Separates network handling logic from HTTP logic.
# Mandatory for Nginx to function
# This block dictates how Nginx handles network connections.
events {
    worker_connections  1024;
    # Number of simultaneous connections each worker can handle
    # worker_processes × worker_connections = max no of connections Nginx can handle
}

# Wraps all HTTP web server logic.
# Mandatory for Nginx to function
# This block contains the settings for handling web traffic.
http {
    include       mime.types; # Imports a mapping file of file extensions to MIME types (e.g., .css -> text/css).
    default_type  application/octet-stream; # Default file type if not specified

    client_max_body_size 10m;
    # Restricts the maximum size of a client request body (e.g., file uploads) to 10 Megabytes.
    # Default to 1m. set 0 to disable limits
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    # Creates a memory zone (api_limit) 10MB in size to track client IP addresses, allowing only 10 requests per second per IP.
    # Prevents Brute-force attacks and Application-layer DDoS attacks.
    # Recommendation: Can rate-limit based on session tokens or user IDs instead of IP addresses.

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                '$status $body_bytes_sent '
                'upstream: $upstream_addr '
                'status: $upstream_status '
                'request_time: $request_time '
                'upstream_time: $upstream_response_time '
                '"$http_user_agent"';

    access_log  logs/access.log  main;
    # Defines a custom layout for access logs and saves them to a file.
    # Recommendation: Send logs to a centralized server like Datadog or ELK using syslog.

    # This block defines your backend application servers.
    # Groups multiple backend servers into a single logical pool named backend_servers.
    upstream backend_servers {
        sticky;
        # Ensures that requests from the same client are always sent to the same backend server.
        # Traffic will be distributed strictly round-robin.
        # Recommendation: ip_hash; (Routes based on client IP) or least_conn; (Routes to the least busy server).
        
        server backend1:8000 max_fails=3 fail_timeout=30s;
        # Defines the first backend server with IP address backend1 and port 8000.
        server backend2:8001 max_fails=3 fail_timeout=30s;
        # Defines the second backend server with IP address backend2 and port 8001.
        # Recommendation: Add weight=X to prioritize certain servers or backup; to mark a server as a failover.
        # server 192.168.1.10:8000 backup; (Designates a fallback server).
    }

    sendfile        on;
    # Forces Nginx to send all HTTP response headers in a single network packet, rather than one by one. Works in tandem with sendfile on;
    # Optimizes network efficiency and reduces overhead when serving static files.
    #tcp_nopush     on;

    # Immediately closes the connection after a request is fulfilled.
    # Recommendation: Keep this commented out.
    # Your active setting (keepalive_timeout 65;) remains in effect, keeping connections open for 65 seconds so browsers can download multiple files without re-establishing a connection.
    keepalive_timeout  65;

    # Compresses response bodies (like HTML, CSS, JS) before sending them to the client.
    # Reduces bandwidth usage and speeds up page load times.
    # Use Brotli compression (requires a custom Nginx module, but offers better compression ratios than gzip).
    #gzip  on;

    # HTTP → HTTPS redirect
    # These virtual servers listen for traffic and route it to the right places.
    # Listens on port 80 (HTTP) and immediately replies with a 301 Permanent Redirect to the HTTPS version.
    server {
        listen 80;
        server_name login-application.com;
        return 301 https://$host$request_uri;
    }

    server {
        # Listens on port 443 for encrypted TLS/SSL traffic, using the provided cert and key files.
        # This is the main server block that handles all HTTPS traffic.
        # Recommendation: Using a managed load balancer (like AWS ALB) to handle SSL termination before it even reaches Nginx.
        listen       443 ssl;
        server_name login-application.com;

        # Sets the default character encoding of the webpage to koi8-r (a Russian Cyrillic character set).
        # Recommendation: charset utf-8; (This is the modern web standard and highly recommended).
        #charset koi8-r;

        access_log /dev/stdout main;

        ssl_certificate     /usr/local/nginx/certs/login-application.crt;
        ssl_certificate_key /usr/local/nginx/certs/login-application.key;

        # Frontend
        # Catches all root traffic (/) and forwards it to the React frontend container.
        # Recommendation: Serving compiled React static files directly via root /var/www/html; instead of proxying to a Node/Vite dev server.
        location / {
            proxy_pass http://frontend:5173;
            proxy_set_header Host $host;

            proxy_connect_timeout 2s;
            proxy_read_timeout 5s;

            proxy_next_upstream error timeout http_502 http_503;
        }

        # Backend API
        location /api/ {
            # Applies the rate limit (defined earlier) to API routes. burst=20 allows sudden spikes of 20 requests. nodelay processes them instantly instead of artificially slowing them down.
            limit_req zone=api_limit burst=20 nodelay;
    
            proxy_pass http://backend_servers;

            proxy_connect_timeout 2s;
            proxy_read_timeout 5s;
            # High-availability logic. If backend1 crashes or returns a 500/502 error, Nginx will transparently retry the request on backend2 (up to 3 times).
            proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504 non_idempotent;
            proxy_next_upstream_tries 3;

            proxy_set_header Host $host;
        }

        #error_page  404              /404.html;

        # redirect server error pages to the static page /50x.html
        # Catches common server errors and displays a user-friendly static HTML page.
        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   html;
        }

        # Nginx is often used to serve PHP applications (like WordPress). These blocks are standard boilerplate for routing traffic to a PHP processor. Since you are using Node/React, you don't need these.
        # proxy the PHP scripts to Apache listening on 127.0.0.1:80
        # Catches any request ending in .php and forwards it to an Apache web server running on the same machine.
        #location ~ \.php$ {
        #    proxy_pass   http://127.0.0.1;
        #}

        # pass the PHP scripts to FastCGI server listening on 127.0.0.1:9000
        # Forwards .php requests to a FastCGI server (typically PHP-FPM) rather than Apache.
        # This is the modern, high-performance way to run PHP with Nginx (a "LEMP" stack). It includes the necessary routing parameters (fastcgi_param).
        #location ~ \.php$ {
        #    root           html;
        #    fastcgi_pass   127.0.0.1:9000;
        #    fastcgi_index  index.php;
        #    fastcgi_param  SCRIPT_FILENAME  /scripts$fastcgi_script_name;
        #    include        fastcgi_params;
        #}

        # deny access to .htaccess files, if Apache's document root
        # concurs with nginx's one
        # Blocks all web access to files starting with .ht (like .htaccess or .htpasswd).
        #location ~ /\.ht {
        #    deny  all;
        #}
    }


    # another virtual host using mix of IP-, name-, and port-based configuration
    # Recommendation: Writing modular configurations by putting different server blocks in /etc/nginx/conf.d/ and importing them.
    #server {
    #    listen       8000;
    #    listen       somename:8080;
    #    server_name  somename  alias  another.alias;

    #    location / {
    #        root   html;
    #        index  index.html index.htm;
    #    }
    #}


