
#user  nobody;
worker_processes  1;

error_log  logs/error.log;
error_log  logs/error.log  notice;
error_log  logs/error.log  info;

pid        logs/nginx.pid;


events {
    worker_connections  1024;
}


http {
    include       mime.types;
    default_type  application/octet-stream;

    client_max_body_size 10m;
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                '$status $body_bytes_sent '
                'upstream: $upstream_addr '
                'status: $upstream_status '
                'request_time: $request_time '
                'upstream_time: $upstream_response_time '
                '"$http_user_agent"';

    access_log  logs/access.log  main;

    upstream backend_servers {
        sticky;
        
        server backend1:8000;
        server backend2:8001;
    }

    sendfile        on;
    #tcp_nopush     on;

    #keepalive_timeout  0;
    keepalive_timeout  65;

    #gzip  on;

    # HTTP → HTTPS redirect
    server {
        listen 80;
        server_name login-application.com;
        return 301 https://$host$request_uri;
    }

    server {
        listen       443 ssl;
        server_name login-application.com;

        #charset koi8-r;

        access_log /dev/stdout main;

        ssl_certificate     /usr/local/nginx/certs/login-application.crt;
        ssl_certificate_key /usr/local/nginx/certs/login-application.key;

        # Frontend
        location / {
            proxy_pass http://frontend:5173;
            proxy_set_header Host $host;
        }

        # Backend API
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
    
            proxy_pass http://backend_servers;

            proxy_connect_timeout 2s;
            proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504 non_idempotent;
            proxy_next_upstream_tries 3;

            proxy_set_header Host $host;
        }

        #error_page  404              /404.html;

        # redirect server error pages to the static page /50x.html
        #
        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   html;
        }

        # proxy the PHP scripts to Apache listening on 127.0.0.1:80
