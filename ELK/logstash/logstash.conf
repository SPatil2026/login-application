input {
  # This tells Logstash to listen for incoming log data.
  # For example, listening on TCP port 5000 for JSON logs.
#   tcp {
#     port => 5000
#     codec => json
#   }

  beats {
    port => 5044
  }
}

filter {
  # This is where you transform the data. 
  # If you don't need to change the data, you can leave this empty.
#   mutate {
#     add_field => { "setup_type" => "docker-elk" }
#   }
}

output {
  # This tells Logstash where to send the processed data.
  elasticsearch {
    # Uses the Docker service name 'elasticsearch' defined in your compose file
    hosts => ["http://elasticsearch:9200"]
    index => "%{[@metadata][beat]}-%{[@metadata][version]}-%{+YYYY.MM.dd}"
  }
  
  # Prints the output to the console for debugging purposes
  stdout { 
    codec => rubydebug 
  }
}